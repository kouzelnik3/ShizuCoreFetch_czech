<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- الخلفية -->
  <rect width="1200" height="900" fill="#121212" />
  
  <!-- تأثير اللمعان (اختياري) -->
  <defs>
    <linearGradient id="shimmer" x1="-100%" y1="0" x2="0%" y2="0">
      <stop offset="0%" stop-color="#1E1E1E" />
      <stop offset="50%" stop-color="#2C2C2C" />
      <stop offset="100%" stop-color="#1E1E1E" />
      <animate attributeName="x1" values="-100%; 100%" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%; 200%" dur="1.5s" repeatCount="indefinite" />
    </linearGradient>

    <!-- تعريف clipPath لكل سطر (مستطيل يتحرك للكشف/الإخفاء) -->
    <!-- العربي 1: يكشف من اليمين إلى اليسار -->
    <clipPath id="clip-ar1">
      <rect x="0" y="520" width="1200" height="60">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -1200,0; -1200,0; 0,0; 0,0"
          keyTimes="0; 0.125; 0.22; 0.25; 1"
          dur="16s" repeatCount="indefinite" calcMode="linear" />
      </rect>
    </clipPath>

    <!-- الإنجليزي 1: يكشف من اليسار إلى اليمين -->
    <clipPath id="clip-en1">
      <rect x="0" y="580" width="1200" height="60">
        <animateTransform attributeName="transform" type="translate"
          values="1200,0; 0,0; 0,0; 1200,0; 1200,0"
          keyTimes="0; 0.125; 0.22; 0.25; 1"
          dur="16s" repeatCount="indefinite" calcMode="linear" />
      </rect>
    </clipPath>

    <!-- العربي 2: يكشف من اليمين إلى اليسار -->
    <clipPath id="clip-ar2">
      <rect x="0" y="650" width="1200" height="50">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; -1200,0; -1200,0; 0,0; 0,0"
          keyTimes="0; 0.125; 0.22; 0.25; 1"
          dur="16s" repeatCount="indefinite" calcMode="linear" />
      </rect>
    </clipPath>

    <!-- الإنجليزي 2: يكشف من اليسار إلى اليمين -->
    <clipPath id="clip-en2">
      <rect x="0" y="700" width="1200" height="50">
        <animateTransform attributeName="transform" type="translate"
          values="1200,0; 0,0; 0,0; 1200,0; 1200,0"
          keyTimes="0; 0.125; 0.22; 0.25; 1"
          dur="16s" repeatCount="indefinite" calcMode="linear" />
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="900" fill="url(#shimmer)" />

  <!-- أيقونة الإضافة -->
  <g transform="translate(550, 320) scale(4)" fill="#00d1b2">
    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
  </g>

  <!-- النصوص مع تطبيق clipPath -->
  <g clip-path="url(#clip-ar1)">
    <text x="600" y="550" font-family="sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">مساحة إعلانية متاحة</text>
  </g>
  <g clip-path="url(#clip-en1)">
    <text x="600" y="610" font-family="sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">Advertising space available</text>
  </g>
  <g clip-path="url(#clip-ar2)">
    <text x="600" y="680" font-family="sans-serif" font-size="32" fill="#a0a0a0" text-anchor="middle">تواصل مع إدارة "صوان" لحجز هذه المساحة</text>
  </g>
  <g clip-path="url(#clip-en2)">
    <text x="600" y="730" font-family="sans-serif" font-size="32" fill="#a0a0a0" text-anchor="middle">Contact Siwane management to reserve this space</text>
  </g>

  <!-- مؤشر الكتابة (خط وامض) -->
  <rect x="600" y="520" width="3" height="60" fill="#00d1b2" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.49;0.51;1" dur="0.8s" repeatCount="indefinite" />
  </rect>

  <!-- الإطار الخارجي -->
  <rect width="1196" height="896" x="2" y="2" fill="none" stroke="#333333" stroke-width="4" rx="16" />
</svg>
